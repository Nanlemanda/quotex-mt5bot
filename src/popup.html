<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quotex MT5 Bot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 Quotex MT5 Bot</h1>
      <div class="status-indicator" id="statusIndicator">●</div>
    </header>

    <div class="section">
      <h2>MT5 Connection</h2>
      <div class="form-group">
        <label for="hostInput">Host</label>
        <input type="text" id="hostInput" placeholder="localhost" value="localhost">
      </div>
      <div class="form-group">
        <label for="portInput">Port</label>
        <input type="number" id="portInput" placeholder="5555" value="5555" min="1" max="65535">
      </div>
      <div class="form-group checkbox">
        <input type="checkbox" id="enableToggle">
        <label for="enableToggle">Enable Auto Trading</label>
      </div>
      <button id="connectBtn" class="btn btn-primary">Connect</button>
      <p id="connectionStatus" class="status-text"></p>
    </div>

    <div class="section">
      <h2>Trade Settings</h2>
      <div class="form-group checkbox">
        <input type="checkbox" id="autoTradeToggle" checked>
        <label for="autoTradeToggle">Auto Execute Trades</label>
      </div>
    </div>

    <div class="section">
      <h2>Recent Trades</h2>
      <div id="tradesList" class="trades-list"></div>
    </div>

    <footer>
      <p>v1.0.0</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
